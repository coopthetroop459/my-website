<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 750px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    /* Header */
    .header {
      background: linear-gradient(90deg, #e94560, #0f3460);
      padding: 20px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-avatar {
      width: 45px;
      height: 45px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .header-info h2 {
      color: white;
      font-size: 18px;
    }

    .header-info p {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Chat Box */
    .chat-box {
      height: 420px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scroll-behavior: smooth;
    }

    .chat-box::-webkit-scrollbar { width: 5px; }
    .chat-box::-webkit-scrollbar-track { background: transparent; }
    .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }

    .message {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .message-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.ai .message-avatar { background: linear-gradient(135deg, #e94560, #0f3460); }
    .message.user .message-avatar { background: linear-gradient(135deg, #4ade80, #06b6d4); }

    .message-content {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      color: white;
    }

    .message.ai .message-content {
      background: rgba(255,255,255,0.1);
      border-bottom-left-radius: 4px;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #e94560, #c2185b);
      border-bottom-right-radius: 4px;
    }

    .message-content img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 8px;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.1);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    /* Image Preview */
    .image-preview {
      padding: 0 20px 10px;
      display: none;
    }

    .image-preview img {
      height: 70px;
      border-radius: 10px;
      border: 2px solid #e94560;
    }

    .image-preview button {
      background: #e94560;
      color: white;
      border: none;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      cursor: pointer;
      margin-left: 8px;
      font-size: 14px;
      vertical-align: top;
    }

    /* Input Area */
    .input-area {
      padding: 15px 20px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 15px;
      padding: 12px 15px;
      color: white;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 120px;
      font-family: inherit;
    }

    .input-box::placeholder { color: rgba(255,255,255,0.4); }
    .input-box:focus { border-color: #e94560; }

    .icon-btn {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:hover { transform: scale(1.1); }

    .photo-btn {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .send-btn {
      background: linear-gradient(135deg, #e94560, #c2185b);
      color: white;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .tool-chip {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tool-chip:hover {
      background: #e94560;
      border-color: #e94560;
      color: white;
    }

    /* Mode selector */
    .mode-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      overflow-x: auto;
    }

    .mode-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .mode-btn.active, .mode-btn:hover {
      background: #e94560;
      border-color: #e94560;
      color: white;
    }

    #fileInput { display: none; }

    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      padding: 8px 12px;
      background: rgba(255,107,107,0.1);
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <h2>My AI Assistant</h2>
      <p><span class="status-dot"></span>Online and ready</p>
    </div>
  </div>

  <!-- Mode Selector -->
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode(this, '')">💬 Chat</button>
    <button class="mode-btn" onclick="setMode(this, 'You are a coding expert. Help with code and explain clearly.')">💻 Code Helper</button>
    <button class="mode-btn" onclick="setMode(this, 'You are a creative writer. Help write stories, poems, and creative content.')">✍️ Writer</button>
    <button class="mode-btn" onclick="setMode(this, 'You are a teacher. Explain things simply like the user is a beginner.')">📚 Tutor</button>
    <button class="mode-btn" onclick="setMode(this, 'You are a funny comedian. Be witty and humorous in all responses.')">😂 Fun Mode</button>
  </div>

  <!-- Chat Messages -->
  <div class="chat-box" id="chatBox">
    <div class="message ai">
      <div class="message-avatar">🤖</div>
      <div class="message-content">
        Hey there! I am your AI assistant. You can chat with me, upload photos, or pick a mode above. How can I help you today?
      </div>
    </div>
  </div>

  <!-- Image Preview -->
  <div class="image-preview" id="imagePreview">
    <img id="previewImg" src="" alt="preview" />
    <button onclick="removeImage()">✕</button>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="toolbar">
      <span class="tool-chip" onclick="quickPrompt('Summarize this for me: ')">📋 Summarize</span>
      <span class="tool-chip" onclick="quickPrompt('Translate this to Spanish: ')">🌍 Translate</span>
      <span class="tool-chip" onclick="quickPrompt('Fix the grammar in this: ')">✅ Fix Grammar</span>
      <span class="tool-chip" onclick="quickPrompt('Write a short poem about: ')">🎵 Poem</span>
      <span class="tool-chip" onclick="clearChat()">🗑️ Clear Chat</span>
    </div>
    <div class="input-row">
      <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)" />
      <button class="icon-btn photo-btn" onclick="document.getElementById('fileInput').click()">📷</button>
      <textarea
        class="input-box"
        id="userInput"
        placeholder="Type a message..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="icon-btn send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script>
  // =====================
  // PASTE YOUR GROQ API KEY BELOW
  const API_KEY = 'YOUR_GROQ_API_KEY';
  // =====================

  let systemPrompt = 'You are a helpful AI assistant. Keep answers clear and friendly.';
  let chatHistory = [];
  let selectedImage = null;

  function setMode(btn, prompt) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    systemPrompt = prompt || 'You are a helpful AI assistant. Keep answers clear and friendly.';
    addMessage('ai', 'Mode changed! I am ready in ' + btn.innerText + ' mode.');
  }

  function quickPrompt(text) {
    document.getElementById('userInput').value = text;
    document.getElementById('userInput').focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      selectedImage = e.target.result;
      document.getElementById('previewImg').src = selectedImage;
      document.getElementById('imagePreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function removeImage() {
    selectedImage = null;
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('fileInput').value = '';
  }

  function clearChat() {
    chatHistory = [];
    document.getElementById('chatBox').innerHTML = `
      <div class="message ai">
        <div class="message-avatar">🤖</div>
        <div class="message-content">Chat cleared! Start a new conversation.</div>
      </div>`;
  }

  function addMessage(role, text, imgSrc = null) {
    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.innerHTML = `
      <div class="message-avatar">${role === 'ai' ? '🤖' : '🧑'}</div>
      <div class="message-content">
        ${text}
        ${imgSrc ? `<img src="${imgSrc}" alt="uploaded image"/>` : ''}
      </div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="message-avatar">🤖</div>
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const question = input.value.trim();
    if (!question && !selectedImage) return;

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;

    // Show user message
    addMessage('user', question || '(image sent)', selectedImage);
    const imgToSend = selectedImage;
    removeImage();
    input.value = '';
    input.style.height = 'auto';

    // Add to history
    chatHistory.push({ role: 'user', content: question || 'Describe this image.' });

    showTyping();

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + API_KEY
        },
        body: JSON.stringify({
          model: 'llama-3.1-8b-instant',
          messages: [
            { role: 'system', content: systemPrompt },
            ...chatHistory
          ]
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.choices) {
        const reply = data.choices[0].message.content;
        chatHistory.push({ role: 'assistant', content: reply });
        addMessage('ai', reply);
      } else {
        addMessage('ai', '<span class="error-msg">Error: ' + (data.error?.message || 'Something went wrong') + '</span>');
      }

    } catch (err) {
      removeTyping();
      addMessage('ai', '<span class="error-msg">Connection error: ' + err.message + '</span>');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
